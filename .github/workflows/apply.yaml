name: Terraform Apply

# Trigger only when code is merged/pushed to main
on:
  push:
    branches:
      - main

jobs:
  apply:
    runs-on: ubuntu-latest

    # Optional approval gate
    # Configure the "production" environment in GitHub Settings
    environment: production

    steps:
      # Step 1: Checkout repository code
      - uses: actions/checkout@v4

      # Step 2: Install Terraform
      - uses: hashicorp/setup-terraform@v3

      # Step 3: Initialize Terraform
      - name: Init
        run: terraform init

      # Step 4: Generate and save execution plan
      - name: Plan (Re-run for Safety)
        run: terraform plan -out=tfplan

      # Save plan to a file so apply uses exactly
      # what was reviewed and planned

      # Step 5: Apply infrastructure changes
      - name: Apply
        run: terraform apply -auto-approve tfplan

      # Step 6: Commit updated state file back to Git
      - name: Commit Updated State Back to Git
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

          git add terraform.tfstate

          git diff --staged --quiet || \
          git commit -m "ci: update terraform state after apply [skip ci]"

          git push