name: Terraform Plan

# Run when a Pull Request targets main
on:
  pull_request:
    branches:
      - main

# Permissions required to post comments on the PR
permissions:
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - uses: actions/checkout@v4

      # Step 2: Install Terraform
      - uses: hashicorp/setup-terraform@v3

      # Step 3: Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Step 4: Generate Terraform Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      # Capture output even if terraform plan fails
      # Store output in plan-output.txt

      # Step 5: Post plan output as a PR comment
      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const plan = fs.readFileSync(
              'plan-output.txt',
              'utf8'
            );

            const status = '${{ steps.plan.outcome }}';

            const icon =
              status === 'success' ? '✅' : '❌';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ${icon} Terraform Plan

\`\`\`
${plan.slice(0, 65000)}
\`\`\``
            });

      # Step 6: Fail workflow if plan failed
      - name: Fail if Plan Errored
        if: steps.plan.outcome == 'failure'
        run: exit 1